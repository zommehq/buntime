name: Publish Helm Charts

on:
  push:
    branches: [main]
    paths:
      - "charts/**"
      - "plugins/*/manifest.yaml"
      - "scripts/generate-helm*.ts"
      - ".github/workflows/helm-publish.yml"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout buntime
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Generate Helm files
        run: bun scripts/generate-helm.ts

      - name: Sync to zommehq/charts
        run: |
          VERSION=$(grep '^version:' charts/Chart.yaml | awk '{print $2}')
          echo "Chart version: $VERSION"

          # Prepare chart files
          mkdir -p sync/buntime
          cp -r charts/* sync/buntime/

          # Copy release notes as app-readme.md (displayed by Rancher in chart info)
          if [ -f charts/release-notes.md ]; then
            cp charts/release-notes.md sync/buntime/app-readme.md
          fi

          # Clone charts repo
          git clone https://x-access-token:${{ secrets.CHARTS_PAT }}@github.com/zommehq/charts.git /tmp/charts

          # Create versioned directory (preserves previous versions)
          mkdir -p /tmp/charts/charts/buntime/"$VERSION"
          cp -r sync/buntime/* /tmp/charts/charts/buntime/"$VERSION"/

          # Remove flat files from previous layout (if they exist at charts/buntime/ root)
          rm -f /tmp/charts/charts/buntime/Chart.yaml \
                /tmp/charts/charts/buntime/values.yaml \
                /tmp/charts/charts/buntime/values.base.yaml \
                /tmp/charts/charts/buntime/configmap.base.yaml \
                /tmp/charts/charts/buntime/questions.yml \
                /tmp/charts/charts/buntime/questions.base.yaml
          rm -rf /tmp/charts/charts/buntime/templates

          cd /tmp/charts
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add .
          git diff --staged --quiet || git commit -m "chore: publish buntime chart v$VERSION"
          git push origin main
