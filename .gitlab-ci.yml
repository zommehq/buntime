stages:
  - prepare
  - validate
  - performance
  - package
  - deploy
  - publish

variables:
  BUN_INSTALL_CACHE_DIR: "$CI_PROJECT_DIR/.bun-cache"
  BUNTIME_RELEASE_NAME: buntime
  DOCKER_DRIVER: overlay2
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  KUBE_NAMESPACE: zomme

default:
  image: oven/bun:1.3.13
  tags:
    - docker
  cache:
    key:
      files:
        - bun.lock
    paths:
      - .bun-cache/
  before_script:
    - bun install --frozen-lockfile

helm:generate:
  stage: prepare
  script:
    - bun scripts/generate-helm.ts
  artifacts:
    expire_in: 1 week
    paths:
      - charts/questions.yml
      - charts/templates/configmap.yaml
      - charts/values.yaml

runtime:test:
  stage: validate
  script:
    - cd apps/runtime
    - bun run lint:types
    - bun test

helm:template:
  stage: validate
  image: alpine/helm:3.14.4
  needs:
    - job: helm:generate
      artifacts: true
  before_script: []
  script:
    - helm lint ./charts
    - helm template "$BUNTIME_RELEASE_NAME" ./charts --namespace "$KUBE_NAMESPACE"

runtime:performance:
  stage: performance
  script:
    - cd apps/runtime
    - bun run perf:ci
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - apps/runtime/perf-results.json

container:image:
  stage: package
  image: docker:24
  services:
    - name: docker:24-dind
      alias: docker
      command: ["--tls=false", "--insecure-registry=registry.gitlab.home"]
  needs:
    - runtime:test
    - runtime:performance
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - docker pull "$CI_REGISTRY_IMAGE:latest" || true
  script:
    - docker info
    - docker build --cache-from "$CI_REGISTRY_IMAGE:latest" -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" -t "$CI_REGISTRY_IMAGE:latest" .
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker tag "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"
        docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_TAG"
      fi
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
    - docker push "$CI_REGISTRY_IMAGE:latest"
  rules:
    - if: "$CI_COMMIT_TAG"
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - when: manual
      allow_failure: true

deploy:rancher:
  stage: deploy
  image: alpine/helm:3.14.4
  needs:
    - job: helm:generate
      artifacts: true
  before_script: []
  script:
    - test -n "$KUBECONFIG_B64"
    - mkdir -p "$HOME/.kube"
    - echo "$KUBECONFIG_B64" | base64 -d > "$HOME/.kube/config"
    - chmod 600 "$HOME/.kube/config"
    - export IMAGE_REPOSITORY="${BUNTIME_IMAGE_REPOSITORY:-$CI_REGISTRY_IMAGE}"
    - export IMAGE_TAG="${BUNTIME_IMAGE_TAG:-$CI_COMMIT_SHORT_SHA}"
    - helm upgrade --install "$BUNTIME_RELEASE_NAME" ./charts --namespace "$KUBE_NAMESPACE" --create-namespace --set image.repository="$IMAGE_REPOSITORY" --set image.tag="$IMAGE_TAG" --set image.pullPolicy=Always
  environment:
    name: rancher-local
    url: https://buntime.home
  rules:
    - when: manual

helm:publish-local:
  stage: publish
  needs:
    - job: helm:generate
      artifacts: true
  before_script:
    - apt-get update
    - apt-get install -y ca-certificates git
    - git config --global user.email ci@gitlab.home
    - git config --global user.name GitLab-CI
    - git config --global http.sslVerify false
  script:
    - test -n "$CHARTS_TOKEN"
    - VERSION="$(grep '^version:' charts/Chart.yaml | awk '{print $2}')"
    - mkdir -p sync/buntime
    - cp -r charts/* sync/buntime/
    - git clone "https://root:${CHARTS_TOKEN}@gitlab.home/zomme/charts.git" /tmp/charts
    - mkdir -p "/tmp/charts/charts/buntime/$VERSION"
    - cp -r sync/buntime/* "/tmp/charts/charts/buntime/$VERSION/"
    - cd /tmp/charts
    - git add .
    - git diff --staged --quiet || git commit -m "chore: publish buntime chart v$VERSION"
    - git push origin main
  rules:
    - when: manual
