# Buntime Helm Chart - Base Questions (Runtime Core)
# This file contains only the runtime core configuration.
# Plugin questions are generated automatically from manifest.yaml files.
#
# DO NOT EDIT questions.yml directly - it is auto-generated.
# Run: bun scripts/generate-helm-questions.ts

questions:
  # ==================== RUNTIME ====================
  - variable: buntime.logLevel
    label: "Log Level"
    description: "Application log verbosity"
    type: enum
    default: "info"
    options:
      - "debug"
      - "info"
      - "warn"
      - "error"
    group: "Runtime"

  - variable: buntime.poolSize
    label: "Worker Pool Size"
    description: "Maximum number of concurrent workers"
    type: int
    default: 100
    min: 1
    max: 1000
    group: "Runtime"

  - variable: buntime.ephemeralConcurrency
    label: "Ephemeral Worker Concurrency"
    description: "Maximum concurrent ttl=0 worker requests before queueing"
    type: int
    default: 2
    min: 1
    max: 100
    group: "Runtime"

  - variable: buntime.ephemeralQueueLimit
    label: "Ephemeral Worker Queue Limit"
    description: "Maximum queued ttl=0 requests before returning 503"
    type: int
    default: 100
    min: 0
    max: 10000
    group: "Runtime"

  - variable: buntime.workerConfigCacheTtlMs
    label: "Worker Config Cache TTL"
    description: "Positive worker manifest/config cache TTL in milliseconds; use 0 to disable"
    type: int
    default: 1000
    min: 0
    max: 60000
    group: "Runtime"

  - variable: buntime.workerResolverCacheTtlMs
    label: "Worker Resolver Cache TTL"
    description: "Positive worker directory lookup cache TTL in milliseconds; use 0 to disable"
    type: int
    default: 1000
    min: 0
    max: 60000
    group: "Runtime"

  - variable: replicaCount
    label: "Replica Count"
    description: "Number of Buntime pod replicas"
    type: int
    default: 1
    min: 1
    max: 10
    group: "Runtime"

  # ==================== SCALING ====================
  - variable: autoscaling.enabled
    label: "Enable Autoscaling"
    description: "Enable Horizontal Pod Autoscaler"
    type: boolean
    default: false
    group: "Scaling"

  - variable: autoscaling.minReplicas
    label: "Minimum Replicas"
    description: "Minimum replicas when autoscaling is enabled"
    type: int
    default: 1
    min: 1
    max: 20
    group: "Scaling"

  - variable: autoscaling.maxReplicas
    label: "Maximum Replicas"
    description: "Maximum replicas when autoscaling is enabled"
    type: int
    default: 5
    min: 1
    max: 100
    group: "Scaling"

  - variable: autoscaling.targetCPUUtilizationPercentage
    label: "Target CPU Utilization"
    description: "Average CPU utilization percentage used by the HPA"
    type: int
    default: 70
    min: 1
    max: 100
    group: "Scaling"

  - variable: autoscaling.targetMemoryUtilizationPercentage
    label: "Target Memory Utilization"
    description: "Average memory utilization percentage used by the HPA"
    type: int
    default: 80
    min: 1
    max: 100
    group: "Scaling"

  - variable: podDisruptionBudget.enabled
    label: "Enable PodDisruptionBudget"
    description: "Keep at least one pod available during voluntary disruptions"
    type: boolean
    default: false
    group: "Scaling"

  - variable: podDisruptionBudget.minAvailable
    label: "PDB Minimum Available"
    description: "Minimum available pods for voluntary disruptions"
    type: int
    default: 1
    min: 1
    max: 20
    group: "Scaling"

  - variable: service.type
    label: "Service Type"
    description: "Kubernetes service type"
    type: enum
    default: "NodePort"
    options:
      - "ClusterIP"
      - "NodePort"
      - "LoadBalancer"
    group: "Runtime"

  - variable: buntime.apiPrefix
    label: "API Prefix"
    description: "Prefix for runtime API routes (e.g., '/_' mounts API at '/_/api')"
    type: string
    default: "/_"
    group: "Runtime"

  - variable: buntime.pluginDirs
    label: "Plugin Directories"
    description: "Colon-separated list of plugin directories"
    type: string
    default: "/data/.plugins:/data/plugins"
    group: "Runtime"

  - variable: buntime.workerDirs
    label: "Worker Directories"
    description: "Colon-separated list of worker directories"
    type: string
    default: "/data/.apps:/data/apps"
    group: "Runtime"

  - variable: image.tag
    label: "Image Tag"
    description: "Docker image tag (use 'latest' for most recent)"
    type: string
    default: "latest"
    group: "Runtime"

  # ==================== INGRESS ====================
  - variable: ingress.host
    label: "Ingress Hostname"
    description: "Hostname only, no protocol/path (e.g., buntime.example.com or *.example.com). Leave empty to disable."
    type: hostname
    default: ""
    group: "Runtime"

  - variable: ingress.className
    label: "Ingress Class"
    description: "Ingress controller class name"
    type: string
    default: "traefik"
    group: "Runtime"

  - variable: ingress.maxBodySize
    label: "Max Upload Size"
    description: "Maximum request body size for nginx (e.g., 100m, 0 for unlimited)"
    type: string
    default: "100m"
    group: "Runtime"

  - variable: ingress.tls.enabled
    label: "Enable TLS"
    description: "Enable HTTPS with TLS certificate"
    type: boolean
    default: false
    group: "Runtime"

  # ==================== RESOURCES ====================
  - variable: resources.requests.cpu
    label: "CPU Request"
    description: "CPU requested by each runtime pod"
    type: string
    default: "250m"
    group: "Resources"

  - variable: resources.requests.memory
    label: "Memory Request"
    description: "Memory requested by each runtime pod"
    type: string
    default: "256Mi"
    group: "Resources"

  - variable: resources.limits.cpu
    label: "CPU Limit"
    description: "CPU limit for each runtime pod"
    type: string
    default: "2"
    group: "Resources"

  - variable: resources.limits.memory
    label: "Memory Limit"
    description: "Memory limit for each runtime pod"
    type: string
    default: "1Gi"
    group: "Resources"

  # ==================== STORAGE ====================
  - variable: persistence.plugins.size
    label: "Plugins Volume Size"
    description: "Size of persistent volume for custom plugins"
    type: string
    default: "5Gi"
    group: "Runtime"

  - variable: persistence.plugins.accessMode
    label: "Plugins Access Mode"
    description: "PVC access mode (ReadWriteMany recommended for rolling updates and scaling)"
    type: enum
    default: "ReadWriteMany"
    options:
      - "ReadWriteOnce"
      - "ReadWriteMany"
    group: "Runtime"

  - variable: persistence.plugins.storageClass
    label: "Plugins Storage Class"
    description: "Storage class for plugins volume (leave empty for default)"
    type: storageclass
    default: ""
    group: "Runtime"

  - variable: persistence.apps.size
    label: "Apps Volume Size"
    description: "Size of persistent volume for user applications"
    type: string
    default: "10Gi"
    group: "Runtime"

  - variable: persistence.apps.accessMode
    label: "Apps Access Mode"
    description: "PVC access mode (ReadWriteMany recommended for rolling updates and scaling)"
    type: enum
    default: "ReadWriteMany"
    options:
      - "ReadWriteOnce"
      - "ReadWriteMany"
    group: "Runtime"

  - variable: persistence.apps.storageClass
    label: "Apps Storage Class"
    description: "Storage class for apps volume (leave empty for default)"
    type: storageclass
    default: ""
    group: "Runtime"

# Plugin questions will be appended below by generate-helm-questions.ts
